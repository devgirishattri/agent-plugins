name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: validate-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run release validation
        run: bash scripts/validate-release.sh

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Ubuntu runners ship with shellcheck preinstalled. It picks up the
      # repo-root .shellcheckrc automatically. Gate only on error-severity
      # findings; warnings/info are reported locally but do not block CI.
      - name: Run shellcheck (error severity)
        run: |
          shellcheck --version
          find . -path ./.git -prune -o -type f -name '*.sh' -print0 \
            | xargs -0 shellcheck --severity=error
