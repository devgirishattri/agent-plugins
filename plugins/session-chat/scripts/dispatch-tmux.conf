# dispatch-tmux.conf — Minimal tmux config for task-dispatcher plugin
# Sourced automatically on first /dispatch. Non-destructive.

# Show pane labels in borders (requires @name set via set-option -p @name)
set -g pane-border-format " #{?@name,#{@name},#{pane_index}} "
set -g pane-border-status top
set -g pane-border-lines heavy
set -g pane-active-border-style fg=green
set -g pane-border-style fg=colour236

# Mouse support for pane selection and scrolling
set -g mouse on

# Status bar — clear formatting
set -g status-style bg=colour236,fg=white
set -g status-left " [#S] "
set -g status-left-length 30
set -g status-right " #{pane_index}/#{window_panes} panes | %H:%M "
set -g window-status-format ""
set -g window-status-current-format ""

# Auto-balance panes on split
set-hook -g after-split-window 'select-layout tiled'
